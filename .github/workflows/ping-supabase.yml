name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_CONNECTIONS: ${{ secrets.SUPABASE_CONNECTIONS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Ping Supabase
        run: |
          node - <<'NODE'
          const { createClient } = require('@supabase/supabase-js');

          const configs = JSON.parse(process.env.SUPABASE_CONNECTIONS);
          const production = configs.find(c => c.name === 'Production') ?? configs[0];

          if (!production?.url || !production?.key) {
            throw new Error('Missing Supabase url/key in secret JSON');
          }

          (async () => {
            const supabase = createClient(production.url, production.key);
            const { error } = await supabase.from('your_table').select('id').limit(1);
            if (error) throw error;
            console.log('Supabase ping successful');
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE
